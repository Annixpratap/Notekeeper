services:
  - type: web
    name: notes-app-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma migrate deploy && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notes-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://notekeeper-1-x6wo.onrender.com
      - key: API_URL
        value: https://notekeeper-7bn4.onrender.com

  - type: web
    name: notes-app-frontend
    runtime: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run preview
    envVars:
      - key: VITE_API_URL
        value: https://notekeeper-7bn4.onrender.com

databases:
  - name: notes-app-db
    databaseName: notes_app
    user: notes_app_user
    plan: free
