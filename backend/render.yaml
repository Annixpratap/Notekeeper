services:
  - type: web
    name: notes-app-backend
    runtime: node
    plan: free
    buildCommand: npm install && npx prisma migrate deploy && npx prisma generate
    startCommand: node src/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: notes-app-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 5000
      - key: CORS_ORIGIN
        value: https://notes-app-frontend.onrender.com
      - key: API_URL
        value: https://notes-app-backend.onrender.com

databases:
  - name: notes-app-db
    databaseName: notes_app
    user: notes_app_user
    plan: free
